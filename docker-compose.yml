networks:
  data-pipeline:
    driver: bridge

volumes:
  postgres-data:
  minio-data:

services:

  postgres:
    image: postgres:16.6
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - data-pipeline

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - data-pipeline

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/warehouse &&
      mc mb --ignore-existing local/raw
      "
    restart: "no"
    networks:
      - data-pipeline

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 768M
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls=localhost:9644 | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - data-pipeline

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
      SCHEMA_REGISTRY_URLS: http://redpanda:8081
    ports:
      - "8888:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - data-pipeline

  flink-jobmanager:
    build:
      context: ./docker/flink
      dockerfile: Dockerfile
    image: flink-custom:1.20.1
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        state.backend.type: hashmap
        execution.checkpointing.interval: 10000
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8081:8081"
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - data-pipeline

  flink-taskmanager:
    image: flink-custom:1.20.1
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        state.backend.type: hashmap
        execution.checkpointing.interval: 10000
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - data-pipeline

  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "-h", "spark-master", "-p", "7077", "--webui-port", "8080"]
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - data-pipeline

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8082", "-m", "2g"]
    ports:
      - "8082:8082"
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - data-pipeline

  crypto-ingest:
    build:
      context: ./crypto-ingest
    container_name: crypto-ingest
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com}
      SYMBOLS: ${SYMBOLS:-BTCUSDT,ETHUSDT,ETHBTC}
      TRADE_POLL_INTERVAL: ${TRADE_POLL_INTERVAL:-5s}
      ORDERBOOK_POLL_INTERVAL: ${ORDERBOOK_POLL_INTERVAL:-5s}
      ORDERBOOK_DEPTH: ${ORDERBOOK_DEPTH:-20}
      TICKER_POLL_INTERVAL: ${TICKER_POLL_INTERVAL:-30s}
      HEALTH_PORT: ${HEALTH_PORT:-8085}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_BASE_DELAY: ${RETRY_BASE_DELAY:-1s}
      PG_MAX_CONNS: ${PG_MAX_CONNS:-12}
      PG_ACQUIRE_TIMEOUT: ${PG_ACQUIRE_TIMEOUT:-5s}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    stop_grace_period: 15s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/crypto-ingest", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - data-pipeline

  jupyter:
    build:
      context: ./docker/jupyter
      dockerfile: Dockerfile
    image: jupyter-custom:spark-3.5.3
    container_name: jupyter
    user: root
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NB_UID: "1000"
      NB_GID: "100"
      CHOWN_HOME: "yes"
    ports:
      - "8890:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - data-pipeline
